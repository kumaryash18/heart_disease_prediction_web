<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
        crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Heart Disease Prediction</title>
</head>
<body>
    <div class="container">
        <h1 class="text-center">Heart Disease Prediction</h1>
        <br>
        {% if prediction %}
        {% if response %}
        <div class="text-center text-danger">
            Prediction: Heart Disease
        </div>
        {% else %}
        <div class="text-center text-success">
            Prediction: Normal
        </div>
        {% endif %}
        {% endif %}
        <form action="predict" method="POST" class="row">
            <div class="col-md-4">
                <label class="form-label">Enter age:</label>
                <input type="text" name="age" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Select gender:</label>
                <select name="sex" class="form-control">
                    <option selected class="text-muted">Choose...</option>
                    <option value=1>Male</option>
                    <option value=0>Female</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Enter Chest Pain type:</label>
                <input type="text" name="cp" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Enter Resting Blood Pressure (in mm Hg):</label>
                <input type="text" name="trestbps" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Enter serum Cholestrol (in mg/dl):</label>
                <input type="text" name="chol" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label">Enter Resting ECG Level:</label>
                <input type="text" name="restecg" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Enter maximum heart rate acheived:</label>
                <input type="text" name="thalach" class="form-control">
            </div>
            <div class="col-md-4">
                <label class="form-label">Enter ST depression induced by exercise relative to rest:</label>
                <input type="text" name="oldpeak" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label">Enter number of major vessels (0-3) colored by flourosopy:</label>
                <input type="text" name="ca" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label">Enter thal:</label>
                <input type="text" name="thal" class="form-control">
            </div>
            <br>
            <div class="text-center">
                <input type="submit" value="Submit" class="btn btn-primary">
            </div>
        </form>
    </div>
</body>
</html>
